name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: JavaScript syntax check
        run: node --check client/app.js

      - name: Python syntax check
        run: |
          python -m py_compile \
            server/main.py \
            server/sandbox_manager.py \
            server/qemu_launcher.py \
            server/build_desktop.py \
            scripts/full_stack_smoke.py \
            scripts/first_portal_smoke.py

      - name: Whitespace check
        run: git diff --check

      - name: Full-stack smoke
        run: python scripts/full_stack_smoke.py

      - name: First portal smoke
        run: python scripts/first_portal_smoke.py

      - name: Installer minimal smoke
        run: ./setup/install_all.sh --minimal
